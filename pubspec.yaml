name: farmatodo
description: "A new Flutter project."

environment:
  sdk: ^3.9.2

dependencies:
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  google_fonts: ^6.2.1
  path: ^1.9.0
  path_provider: ^2.1.2
  sqflite: ^2.3.0
  supabase_flutter: ^2.12.0
  flutter_local_notifications: ^17.2.0
  timezone: ^0.9.3
  workmanager: ^0.6.0
  intl: ^0.19.0  
  shared_preferences: ^2.2.0  


dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/farmatodo.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/images/farmatodo.jpg
    - .env
